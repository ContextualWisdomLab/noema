name: reviewer-ci

on:
  pull_request:
    paths:
      - "reviewer/**"
      - ".github/workflows/reviewer-ci.yml"
  push:
    branches:
      - main
    paths:
      - "reviewer/**"
      - ".github/workflows/reviewer-ci.yml"

permissions:
  contents: read

jobs:
  reviewer:
    name: reviewer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: reviewer
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: setup python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install . pytest pytest-cov interrogate

      - name: test (100% line+branch coverage gate)
        run: python -m pytest

      - name: docstring coverage (100% gate)
        run: python -m interrogate -c pyproject.toml noema_reviewer

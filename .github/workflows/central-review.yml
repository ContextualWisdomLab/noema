name: central-review
run-name: >-
  Noema central review ${{ github.event.client_payload.target_repository }}#${{
  github.event.client_payload.pr_number }}@${{ github.event.client_payload.pr_head_sha }}

on:
  # repository_dispatch is evaluated only from the default branch. Keeping the
  # privileged entrypoint here prevents a caller from selecting branch workflow
  # code before the Noema App key and model credentials are bound.
  repository_dispatch:
    types: [noema-review]

concurrency:
  group: >-
    noema-central-review-${{ github.event.client_payload.target_repository }}-${{
    github.event.client_payload.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  models: read

jobs:
  review:
    name: noema-review
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TARGET_REPOSITORY: ${{ github.event.client_payload.target_repository || '' }}
      PR_NUMBER: ${{ github.event.client_payload.pr_number || '' }}
      EXPECTED_HEAD_SHA: ${{ github.event.client_payload.pr_head_sha || '' }}
    steps:
      - name: Bind dispatch to live organization PR head
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! [[ "$TARGET_REPOSITORY" =~ ^ContextualWisdomLab/[A-Za-z0-9_.-]+$ ]] ||
            ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]] ||
            ! [[ "$EXPECTED_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::Noema dispatch requires a ContextualWisdomLab repository, positive PR number, and full expected head SHA."
            exit 1
          fi
          pr_json="$(gh api "repos/${TARGET_REPOSITORY}/pulls/${PR_NUMBER}")"
          state="$(jq -r '.state // empty' <<<"$pr_json")"
          live_head="$(jq -r '.head.sha // empty' <<<"$pr_json")"
          head_repo="$(jq -r '.head.repo.full_name // empty' <<<"$pr_json")"
          base_repo="$(jq -r '.base.repo.full_name // empty' <<<"$pr_json")"
          if [ "$state" != "open" ] ||
            [ "$live_head" != "$EXPECTED_HEAD_SHA" ] ||
            [ "$head_repo" != "$TARGET_REPOSITORY" ] ||
            [ "$base_repo" != "$TARGET_REPOSITORY" ]; then
            printf '::error::Noema dispatch metadata is stale or untrusted: state=%s expected_head=%s live_head=%s head_repo=%s base_repo=%s.\n' \
              "${state:-missing}" "$EXPECTED_HEAD_SHA" "${live_head:-missing}" \
              "${head_repo:-missing}" "${base_repo:-missing}"
            exit 1
          fi
          repository_name="${TARGET_REPOSITORY#*/}"
          printf 'repository_name=%s\nhead_sha=%s\n' "$repository_name" "$live_head" >>"$GITHUB_OUTPUT"
          printf 'Bound Noema review to %s#%s current head %s.\n' \
            "$TARGET_REPOSITORY" "$PR_NUMBER" "$live_head"

      - name: Mint repository-scoped Noema App token
        id: noema_app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.NOEMA_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.NOEMA_GITHUB_APP_PRIVATE_KEY }}
          owner: ContextualWisdomLab
          repositories: ${{ steps.target.outputs.repository_name }}
          permission-actions: read
          permission-checks: read
          permission-contents: read
          permission-metadata: read
          permission-pull-requests: write
          permission-security-events: read
          permission-statuses: read
          permission-vulnerability-alerts: read

      - name: Checkout trusted Noema reviewer
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Checkout exact target head without executing target code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          ref: ${{ steps.target.outputs.head_sha }}
          token: ${{ steps.noema_app.outputs.token }}
          path: target-source
          persist-credentials: false
          fetch-depth: 1

      - name: Reject untrusted target symlinks
        run: |
          set -euo pipefail
          symlink="$(find target-source -type l -print -quit)"
          if [ -n "$symlink" ]; then
            printf '::error::Noema refuses target symlinks before CodeGraph indexing: %s\n' "$symlink"
            exit 1
          fi
          echo "Target source contains no symlinks."

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install hash-pinned reviewer dependencies
        run: pip install --require-hashes --no-deps -r reviewer/requirements-ci-hashes.txt

      - name: Install and harden lock-pinned CodeGraph
        env:
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
        run: |
          set -euo pipefail
          npm ci --prefix .github/codegraph --ignore-scripts --omit=dev --no-audit --no-fund
          npm audit --prefix .github/codegraph --package-lock-only --omit=dev --audit-level=moderate
          trusted_root="$GITHUB_WORKSPACE/.github/codegraph"
          patched_picomatch="$trusted_root/node_modules/picomatch"
          if [ "$(jq -r '.version' "$patched_picomatch/package.json")" != "4.0.4" ]; then
            echo "::error::Noema CodeGraph requires lock-pinned picomatch 4.0.4."
            exit 1
          fi
          hardened=0
          while IFS= read -r platform; do
            [ -n "$platform" ] || continue
            bundled="$platform/lib/node_modules/picomatch"
            bundled_lock="$platform/lib/node_modules/.package-lock.json"
            [ -d "$bundled" ] || continue
            case "$(realpath "$bundled")" in
              "$trusted_root"/node_modules/@colbymchenry/codegraph-*/lib/node_modules/picomatch) ;;
              *) echo "::error::Refusing to harden CodeGraph outside the trusted package root."; exit 1 ;;
            esac
            test -f "$bundled_lock"
            rm -rf "$bundled"
            mkdir -p "$bundled"
            cp -R "$patched_picomatch"/. "$bundled"/
            patched_lock="$(mktemp)"
            jq --slurpfile trusted "$trusted_root/package-lock.json" \
              '.packages["node_modules/picomatch"] = $trusted[0].packages["node_modules/picomatch"]' \
              "$bundled_lock" >"$patched_lock"
            mv "$patched_lock" "$bundled_lock"
            test "$(jq -r '.version' "$bundled/package.json")" = "4.0.4"
            test "$(jq -r '.packages["node_modules/picomatch"].version' "$bundled_lock")" = "4.0.4"
            hardened=$((hardened + 1))
          done < <(
            find "$trusted_root/node_modules/@colbymchenry" \
              -mindepth 1 -maxdepth 1 -type d -name 'codegraph-*' -print
          )
          if [ "$hardened" -lt 1 ]; then
            echo "::error::No CodeGraph platform bundle was available to harden."
            exit 1
          fi
          codegraph_bin="$trusted_root/node_modules/.bin/codegraph"
          test -x "$codegraph_bin"
          printf 'Using trusted CodeGraph CLI %s.\n' "$("$codegraph_bin" --version)"
          echo "$trusted_root/node_modules/.bin" >>"$GITHUB_PATH"

      - name: Wait for non-OpenCode current-head checks
        env:
          GH_TOKEN: ${{ steps.noema_app.outputs.token }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            live="$(gh api "repos/${TARGET_REPOSITORY}/pulls/${PR_NUMBER}" --jq '[.state, .head.sha] | join(" ")')"
            if [ "$live" != "open $EXPECTED_HEAD_SHA" ]; then
              printf '::error::Noema stopped before review because the PR head changed: expected open %s, observed %s.\n' \
                "$EXPECTED_HEAD_SHA" "$live"
              exit 1
            fi
            pending="$(gh api "repos/${TARGET_REPOSITORY}/commits/${EXPECTED_HEAD_SHA}/check-runs?per_page=100" \
              --jq '[.check_runs[] | select(.name != "opencode-review" and .status != "completed") | .name] | unique | join(", ")')"
            if [ -z "$pending" ]; then
              echo "All non-OpenCode current-head checks are complete."
              exit 0
            fi
            printf 'Noema current-head check wait %s/90: %s\n' "$attempt" "$pending"
            sleep 60
          done
          echo "::error::Noema waited 90 minutes but non-OpenCode current-head checks are still incomplete."
          exit 1

      - name: Run independent PydanticAI review and publish current-head verdict
        env:
          GH_TOKEN: ${{ steps.noema_app.outputs.token }}
          PYTHONPATH: ${{ github.workspace }}/reviewer
          NOEMA_REVIEW_TOKEN_SOURCE: noema-github-app
          NOEMA_LLM_API_URL: ${{ vars.NOEMA_LLM_API_URL }}
          NOEMA_LLM_MODEL: ${{ vars.NOEMA_LLM_MODEL }}
          NOEMA_LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOEMA_LLM_REQUEST_TIMEOUT_SECONDS: ${{ vars.NOEMA_LLM_REQUEST_TIMEOUT_SECONDS || '5400' }}
          # One retry preserves transient recovery while keeping a worst-case
          # primary-timeout plus fallback-timeout path inside the 300m job.
          NOEMA_LLM_MAX_RETRIES: ${{ vars.NOEMA_LLM_MAX_RETRIES || '1' }}
          NOEMA_FALLBACK_LLM_API_URL: https://models.github.ai/inference
          NOEMA_FALLBACK_LLM_MODEL: ${{ vars.NOEMA_FALLBACK_LLM_MODEL || 'openai/gpt-4.1' }}
          NOEMA_FALLBACK_LLM_API_KEY: ${{ secrets.STRIX_GITHUB_MODELS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          printf 'Noema provider contract: primary=%s fallback=%s timeout=%ss retries=%s.\n' \
            "${NOEMA_LLM_MODEL:-missing}" "${NOEMA_FALLBACK_LLM_MODEL:-missing}" \
            "${NOEMA_LLM_REQUEST_TIMEOUT_SECONDS:-missing}" "${NOEMA_LLM_MAX_RETRIES:-missing}"
          set +e
          python -m noema_reviewer \
            --repo "$TARGET_REPOSITORY" \
            --pr-number "$PR_NUMBER" \
            --source-root "$GITHUB_WORKSPACE/target-source" \
            --strict \
            --publish \
            --token-source "$NOEMA_REVIEW_TOKEN_SOURCE" \
            --output "$RUNNER_TEMP/noema-verdict.json"
          reviewer_status=$?
          set -e
          if [ -s "$RUNNER_TEMP/noema-verdict.json" ]; then
            jq '{verdict,summary,findings,blocked_reasons,confidence}' \
              "$RUNNER_TEMP/noema-verdict.json"
          fi
          case "$reviewer_status" in
            0) echo "Noema published a completed current-head verdict." ;;
            2) echo "::error::Noema published REQUEST_CHANGES for concrete current-head evidence."; exit 1 ;;
            *) printf '::error::Noema reviewer failed before a valid verdict; exit=%s.\n' "$reviewer_status"; exit "$reviewer_status" ;;
          esac
